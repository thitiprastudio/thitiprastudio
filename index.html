<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview & VS Mode</title>
    <style>
        /* --- 🎨 โทนสีเรียกเงินตามสูตร --- */
        :root {
            --peach-main: #FF9AA2;    /* ชมพูพีช (ปุ่ม/ไฮไลต์) */
            --soft-pink: #FFC1CC;     /* ชมพูหวาน */
            --gold-pastel: #F6D365;   /* ทองพาสเทล (ป้ายราคา/ปุ่ม Home) */
            --gold-cream: #FFF3B0;    /* ครีมทอง (พื้นหลังราคา) */
            --bg-cream: #FFF8F5;      /* ขาวครีม (พื้นหลังเว็บดูแพง) */
            --lavender: #E6CCFF;      /* ม่วงลาเวนเดอร์ (สีเสริม) */
            --danger: #FF4D4D;
            --max-w: 1100px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-cream); color: #4A4A4A;
        }

        header { text-align: center; padding: 40px 20px; background: white; border-bottom: 3px solid var(--lavender); }
        .logo-container { width: 80px; height: 80px; margin: 0 auto 10px; border-radius: 20px; overflow: hidden; border: 2px solid var(--peach-main); }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ส่วนควบคุมด้านบน --- */
        .top-controls { max-width: var(--max-w); margin: 20px auto; padding: 0 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .vs-open-btn { background: var(--peach-main); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 154, 162, 0.3); transition: 0.3s; }
        .vs-open-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .search-input { width: 100%; max-width: 450px; padding: 12px 20px; border-radius: 25px; border: 2.5px solid var(--lavender); outline: none; background: white; }

        /* --- 📋 รายการฟอนต์หน้าหลัก --- */
        .container { max-width: var(--max-w); margin: 0 auto 50px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .font-card { background: white; border-radius: 15px; padding: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.3s; cursor: pointer; border: 1px solid #EEE; display: flex; flex-direction: column; overflow: hidden; }
        .font-card:hover { border-color: var(--peach-main); transform: translateY(-5px); }

        .font-header { padding: 15px 20px 5px; }
        .font-title-row { display: flex; align-items: baseline; gap: 8px; }
        .font-num { color: var(--peach-main); font-weight: bold; font-size: 1rem; }
        .font-th { font-size: 1.1rem; font-weight: bold; color: #333; }
        .font-en { font-size: 0.75rem; color: #AAA; text-transform: uppercase; }

        .preview-area { padding: 20px; font-size: 1.8rem; text-align: center; color: #222; overflow: hidden; white-space: nowrap; min-height: 60px; }

        .price-footer { background-color: var(--gold-cream); padding: 12px 20px; border-top: 1.5px solid var(--gold-pastel); text-align: right; }
        .price-line { font-size: 0.75rem; font-weight: bold; line-height: 1.5; color: #8B7355; }
        .price-val { color: #D4AF37; font-size: 0.8rem; font-weight: 800; }

        /* --- 🎈 หน้าป๊อปอัพ (Modal) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-content { width: 95%; max-width: 1000px; margin: 0 auto; padding: 60px 10px; display: flex; flex-direction: column; align-items: center; }
        .close-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: var(--danger); color: white; font-size: 25px; border-radius: 50%; cursor: pointer; z-index: 1001; border: none; }

        .modal-select { padding: 10px 15px; border-radius: 12px; border: 2.5px solid var(--peach-main); margin-bottom: 15px; outline: none; cursor: pointer; font-family: inherit; width: 250px; text-align: center; }
        
        .vs-btn-inside { background: var(--lavender); color: #666; border: 2px solid var(--lavender); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-bottom: 25px; transition: 0.3s; }
        .vs-btn-inside:hover { background: var(--peach-main); color: white; border-color: var(--peach-main); }

        /* --- VS Mode Layout --- */
        .vs-layout { display: flex; width: 100%; gap: 15px; margin-top: 25px; }
        .vs-column { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; border: 2px solid var(--lavender); border-radius: 15px; background: white; }
        .vs-display { width: 100%; text-align: center; word-wrap: break-word; line-height: 1.5; min-height: 120px; white-space: pre-wrap; overflow-x: hidden; }

        .back-btn-frame { margin-top: 50px; padding: 12px 35px; border: 2.5px solid var(--gold-pastel); color: #8B7355; border-radius: 12px; cursor: pointer; font-weight: bold; background: white; transition: 0.3s; }
        .back-btn-frame:hover { background: var(--gold-pastel); color: white; }

        input[type=range] { accent-color: var(--peach-main); width: 200px; }

        @media (max-width: 700px) { .vs-layout { flex-direction: column; } .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1 style="font-size: 1.5rem; margin: 0; color: #333;">ThitipraStudio</h1>
    <p style="font-size: 0.8rem; color: #888;">🎨 เว็บเครือ BR&PRH ทดลองพิมพ์และเปรียบเทียบฟอนต์ลายมือก่อนสั่งซื้อค่ะ ✨</p>
    <p style="font-size: 0.8rem; color: #888;">🍷ลูกค้ารอเว็บโหลดสักครู่นะคะ🏡💖</p>
</header>

<div class="top-controls">
    <button class="vs-open-btn" onclick="openVS()">💗 เปิดโหมดเปรียบเทียบฟอนต์ (VS Mode) 🎶</button>
    <input type="text" id="fontSearch" class="search-input" placeholder="🔍 ค้นหาชื่อฟอนต์ที่ต้องการ..." oninput="filterFonts()">
</div>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal('fontModal')">&times;</button>
    <div class="modal-content">
        <button class="vs-btn-inside" onclick="shortcutToVS()">🧸เปรียบเทียบกับฟอนต์อื่น (VS Mode)</button>
        
        <select id="singleFontSelect" class="modal-select" onchange="changeSingleFont(this.value)"></select>
        
        <h2 id="modalFontName" style="color: var(--peach-main); font-size: 1.2rem;">ชื่อฟอนต์</h2>
        <input type="text" id="testerInput" class="search-input" placeholder="ทดลองลองพิมพ์ที่นี่..." oninput="refreshDisplay()">
        
        <div style="margin: 20px 0;">
            <input type="range" id="sizeRange" min="20" max="150" value="70" oninput="refreshDisplay()">
            <span id="sizeLabel" style="font-weight:bold; color:var(--peach-main);">70px</span>
        </div>
        
        <div id="testerDisplay" class="vs-display" style="font-size: 70px;">สวัสดี hello</div>
        <button class="back-btn-frame" onclick="closeModal('fontModal')">← Home</button>
    </div>
</div>

<div class="modal" id="vsModal">
    <button class="close-btn" onclick="closeModal('vsModal')">&times;</button>
    <div class="modal-content">
        <h2 style="color:var(--peach-main); font-size: 1.5rem;">Font Comparison (VS)</h2>
        <input type="text" id="vsInput" class="search-input" placeholder="พิมพ์ข้อความเปรียบเทียบ..." oninput="refreshVS()">
        
        <div style="margin: 15px 0;">
            <input type="range" id="vsSizeRange" min="20" max="120" value="50" oninput="refreshVS()">
            <span id="vsSizeLabel" style="font-weight:bold; color:var(--peach-main);">50px</span>
        </div>

        <div class="vs-layout">
            <div class="vs-column">
                <select id="selectLeft" class="modal-select" style="width:100%;" onchange="refreshVS()"></select>
                <div id="priceLeft" class="price-line" style="margin-bottom:10px;"></div>
                <div id="displayLeft" class="vs-display">สวัสดี hello</div>
            </div>
            <div class="vs-column">
                <select id="selectRight" class="modal-select" style="width:100%;" onchange="refreshVS()"></select>
                <div id="priceRight" class="price-line" style="margin-bottom:10px;"></div>
                <div id="displayRight" class="vs-display">สวัสดี hello</div>
            </div>
        </div>
        <button class="back-btn-frame" onclick="closeModal('vsModal')">← Home</button>
    </div>
</div>

<script>
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" },
        { th: "อโมรี่", en: "Amory", p: "79.-", c: "169.-", file: "Amory.ttf" },
        { th: "ไคลี่", en: "Kylie", p: "79.-", c: "169.-", file: "Kylie.ttf" },
        { th: "เดมี่", en: "Demi", p: "79.-", c: "169.-", file: "Demi.ttf" },
        { th: "เคธี่", en: "Katie", p: "79.-", c: "169.-", file: "Katie.ttf" },
        { th: "เดซี่", en: "Daisy", p: "79.-", c: "169.-", file: "Daisy.ttf" },
        { th: "ลูก้า", en: "Luca", p: "79.-", c: "169.-", file: "Luca.ttf" },
        { th: "ซินดี้", en: "Sindy", p: "89.-", c: "89.-", file: "BRSindy.ttf" },
        { th: "ไรเดอร์", en: "Ryder", p: "89.-", c: "89.-", file: "BRRyder.ttf" },
        { th: "เคซี่", en: "Casey", p: "79.-", c: "79.-", file: "BRCasey.ttf" },
        { th: "ฮันนี่", en: "Honey", p: "79.-", c: "169.-", file: "honey.ttf" },
        { th: "เจสซิก้า", en: "Jessica", p: "79.-", c: "169.-", file: "Jessica.ttf" },
        { th: "ทีกัฟฟี่", en: "Teagaulfy", p: "79.-", c: "169.-", file: "Teagaulfy.ttf" },
        { th: "ซันจิ", en: "Sanji", p: "79.-", c: "169.-", file: "BRSanji.ttf" },
        { th: "เจลลี่แบร์", en: "Jellybear", p: "79.-", c: "169.-", file: "BRJellybear.ttf" },
        { th: "ยูมะ", en: "Yuma", p: "89.-", c: "89.-", file: "BRYuma.ttf" }
    ];

    let currentSingleFont = "";

    async function loadFonts() {
        for (const f of fonts) {
            const font = new FontFace(f.en, `url(${f.file})`, { display: 'swap' });
            await font.load().then(loaded => document.fonts.add(loaded)).catch(e => console.log(e));
        }
        filterFonts();
        const sL = document.getElementById('selectLeft');
        const sR = document.getElementById('selectRight');
        const sS = document.getElementById('singleFontSelect');
        fonts.forEach(f => {
            const opt = `<option value="${f.en}">${f.th}</option>`;
            sL.innerHTML += opt; sR.innerHTML += opt; sS.innerHTML += opt;
        });
        sR.selectedIndex = 1;
    }

    function filterFonts() {
        const term = document.getElementById('fontSearch').value.toLowerCase();
        const list = document.getElementById('fontList');
        list.innerHTML = "";
        fonts.filter(f => f.th.includes(term) || f.en.toLowerCase().includes(term)).forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'font-card';
            div.innerHTML = `
                <div class="font-header">
                    <div class="font-title-row">
                        <span class="font-num">${(i+1).toString().padStart(2,'0')}.</span>
                        <span class="font-th">${f.th}</span>
                        <span class="font-en">${f.en}</span>
                    </div>
                </div>
                <div class="preview-area" style="font-family:'${f.en}'">สวัสดี hello</div>
                <div class="price-footer">
                    <div class="price-line">ส่วนตัว / Personal: <span class="price-val">${f.p}</span></div>
                    <div class="price-line">เชิงพาณิชย์ / Commercial: <span class="price-val">${f.c}</span></div>
                </div>
            `;
            div.onclick = () => openSingleModal(f);
            list.appendChild(div);
        });
    }

    function openSingleModal(f) {
        document.getElementById('fontModal').style.display = 'block';
        document.getElementById('singleFontSelect').value = f.en;
        changeSingleFont(f.en);
        document.getElementById('testerInput').value = "";
        refreshDisplay();
        document.body.style.overflow = 'hidden';
    }

    function changeSingleFont(fontEn) {
        currentSingleFont = fontEn;
        const data = fonts.find(f => f.en === fontEn);
        document.getElementById('modalFontName').innerText = data.th;
        refreshDisplay();
    }

    function refreshDisplay() {
        const val = document.getElementById('testerInput').value || "สวัสดี hello";
        const size = document.getElementById('sizeRange').value;
        const d = document.getElementById('testerDisplay');
        d.innerText = val; d.style.fontFamily = currentSingleFont; d.style.fontSize = size + "px";
        document.getElementById('sizeLabel').innerText = size + "px";
    }

    function shortcutToVS() {
        const txt = document.getElementById('testerInput').value;
        const currentF = document.getElementById('singleFontSelect').value;
        closeModal('fontModal');
        openVS();
        document.getElementById('selectLeft').value = currentF;
        if(txt) document.getElementById('vsInput').value = txt;
        refreshVS();
    }

    function openVS() { document.getElementById('vsModal').style.display = 'block'; document.body.style.overflow = 'hidden'; refreshVS(); }

    function refreshVS() {
        const val = document.getElementById('vsInput').value || "สวัสดี hello";
        const size = document.getElementById('vsSizeRange').value;
        const lF = document.getElementById('selectLeft').value;
        const rF = document.getElementById('selectRight').value;
        const dataL = fonts.find(f => f.en === lF);
        const dataR = fonts.find(f => f.en === rF);
        document.getElementById('priceLeft').innerText = `ส่วนตัว / Personal: ${dataL.p} |เชิงพาณิชย์ / Commercial: ${dataL.c}`;
        document.getElementById('priceRight').innerText = `ส่วนตัว / Personal: ${dataR.p} |เชิงพาณิชย์ / Commercial: ${dataR.c}`;
        const dL = document.getElementById('displayLeft'); const dR = document.getElementById('displayRight');
        dL.innerText = dR.innerText = val;
        dL.style.fontFamily = lF; dR.style.fontFamily = rF;
        dL.style.fontSize = dR.style.fontSize = size + "px";
        document.getElementById('vsSizeLabel').innerText = size + "px";
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }

    loadFonts();
</script>
</body>
</html>
