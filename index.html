<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview</title>
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #d4af37; 
            --bg-color: #fdfdfd;
            --max-w: 800px; /* ความกว้างหน้าแรกแบบ Compact */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--primary-color);
        }

        /* --- Header --- */
        header {
            text-align: center; padding: 50px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Main Page (Compact Grid) --- */
        .container {
            max-width: var(--max-w);
            margin: 30px auto; padding: 0 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: 0.3s; cursor: pointer; border: 1px solid #eee;
        }

        .font-card:hover { border-color: var(--accent-color); transform: translateY(-2px); }

        .font-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .font-names h3 { margin: 0; font-size: 1rem; }
        .font-names p { margin: 2px 0; color: #888; font-size: 0.8rem; }
        .price-tag { text-align: right; font-size: 0.75rem; color: var(--accent-color); font-weight: bold; }

        .preview-text {
            font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- Modal System (Scrollable) --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 90%; max-width: 700px; margin: 0 auto;
            padding: 80px 10px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px; font-size: 35px;
            cursor: pointer; color: #ccc; z-index: 1001;
        }

        .tester-input {
            width: 100%; max-width: 500px; padding: 12px; font-size: 1.1rem;
            margin-bottom: 40px; border: none; border-bottom: 2px solid #eee;
            text-align: center; outline: none; background: white;
            position: sticky; top: 0; z-index: 10;
        }

        /* พื้นที่แสดงฟอนต์ที่ปรับขนาดอัตโนมัติ */
        .tester-display {
            width: 100%; text-align: left; /* ปรับชิดซ้ายให้อ่านง่ายแบบในรูป */
            word-wrap: break-word; line-height: 1.6; color: #111;
            transition: font-size 0.2s ease;
            white-space: pre-wrap; /* รักษาการเว้นวรรคและการขึ้นบรรทัดใหม่ */
        }

        @media (max-width: 600px) {
            .preview-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="IPCB5121.PNG" alt="ThitipraStudio Logo">
    </div>
    <h1>ThitipraStudio</h1>
    <p style="font-size: 0.9rem; color: #888;">ฟอนต์ลายมือน่ารัก สดใสปุ๊กปิ๊กที่สุดในสามโลก</p>
</header>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <h2 id="modalFontName" style="margin: 0; font-size: 1.2rem;">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #bbb; margin: 5px 0 30px 0; font-size: 0.9rem;">Font Name</p>
        
        <input type="text" class="tester-input" id="testerInput" placeholder="ลองพิมพ์ทดสอบยาวๆ ได้ที่นี่..." oninput="updatePreview(this.value)">
        
        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
    </div>
</div>

<script>
    // รายชื่อฟอนต์ (เพิ่มต่อได้เลย)
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" }
    ];

    const list = document.getElementById('fontList');
    const modal = document.getElementById('fontModal');
    const display = document.getElementById('testerDisplay');

    async function loadFonts() {
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`);
                await f.load();
                document.fonts.add(f);
                renderCard(font);
            } catch (e) { renderCard(font); }
        }
    }

    function renderCard(font) {
        const div = document.createElement('div');
        div.className = 'font-card';
        div.innerHTML = `
            <div class="font-info">
                <div class="font-names">
                    <h3>${font.th}</h3>
                    <p>${font.en}</p>
                </div>
                <div class="price-tag">ส่วนตัว: ${font.p} | พาณิชย์: ${font.c}</div>
            </div>
            <div class="preview-text" style="font-family: '${font.en}', sans-serif">สวัสดี hello</div>
        `;
        div.onclick = () => openModal(font);
        list.appendChild(div);
    }

    function openModal(font) {
        modal.style.display = 'block';
        document.getElementById('modalFontName').innerText = font.th;
        document.getElementById('modalFontEn').innerText = font.en;
        display.style.fontFamily = `'${font.en}', sans-serif`;
        display.style.fontSize = "40px"; // Reset ขนาด
        display.innerText = "hello สวัสดี";
        document.getElementById('testerInput').value = "";
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

   จัดไปครับ! ถ้าอยากให้ "ใหญ่สะใจ" สำหรับคนชอบดูรายละเอียดลายเส้นชัดๆ ผมปรับแก้สเกลใหม่ให้เริ่มที่ 80px แล้วค่อยๆ ไล่ระดับลงมาจนจบที่ 30px (ซึ่งยังถือว่าใหญ่อ่านง่ายอยู่) เมื่อพิมพ์ข้อความยาวมากๆ ครับ

โค้ดส่วน JavaScript ที่แก้ไขใหม่:
ก๊อปปี้ส่วนนี้ไปวางทับฟังก์ชัน updatePreview เดิมได้เลยครับ:

JavaScript
    function updatePreview(val) {
        const text = val || "hello สวัสดี";
        display.innerText = text;

        // --- ระบบสเกลขนาดใหญ่พิเศษ ---
        let fontSize = 80; 
        const len = text.length;

        if (len > 300) {
            fontSize = 30; // พิมพ์ยาวเหยียด (เกิน 300 ตัว) ยังคงไว้ที่ 30px ให้อ่านง่าย
        } else if (len > 150) {
            fontSize = 40; // พิมพ์ประมาณ 3-4 บรรทัด
        } else if (len > 50) {
            fontSize = 60; // พิมพ์ประโยคสั้นๆ
        } else {
            fontSize = 80; // พิมพ์คำเดียว หรือไม่กี่คำ (ใหญ่สะใจ)
        }

        display.style.fontSize = fontSize + "px";
    }
    window.onclick = (e) => { if (e.target == modal) closeModal(); }

    loadFonts();
</script>

</body>
</html>
