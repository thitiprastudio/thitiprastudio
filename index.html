<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview & Tester</title>
    <style>
        :root {
            --accent-color: #d4af37; 
            --danger-color: #ff4d4d; 
            --bg-color: #fdfdfd;
            --max-w: 1100px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: #333;
        }

        header {
            text-align: center; padding: 40px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Search & Filter Section --- */
        .controls {
            max-width: var(--max-w); margin: 20px auto; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .search-wrapper { width: 100%; max-width: 500px; position: relative; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd;
            font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }

        .filter-tabs { display: flex; gap: 10px; }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd;
            background: white; cursor: pointer; transition: 0.3s; font-weight: bold; color: #666;
        }
        .tab-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* --- Grid Layout --- */
        .container {
            max-width: var(--max-w); margin: 20px auto 50px; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: 0.3s;
            cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column;
        }
        .font-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .font-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .font-num { color: var(--accent-color); font-weight: bold; font-family: monospace; margin-right: 8px; }
        .font-names h3 { margin: 0; font-size: 1.1rem; }
        .price-tag { text-align: right; font-size: 0.75rem; color: var(--accent-color); font-weight: bold; line-height: 1.4; }

        .preview-text {
            font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 15px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
        }

        /* --- Modal & Tester --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 90%; max-width: 900px; margin: 0 auto;
            padding: 100px 20px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px; width: 45px; height: 45px;
            background-color: var(--danger-color); color: white; font-size: 30px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; z-index: 1001; border: none;
        }

        .tester-controls {
            width: 100%; max-width: 600px; margin-bottom: 40px; text-align: center;
            position: sticky; top: 0; background: white; padding: 10px 0;
        }

        .tester-input {
            width: 100%; padding: 15px; font-size: 1.2rem; border: none;
            border-bottom: 2px solid #eee; text-align: center; outline: none;
        }

        .size-slider-wrapper { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .size-slider { cursor: pointer; accent-color: var(--accent-color); width: 200px; }
        .size-label { font-weight: bold; color: var(--accent-color); min-width: 50px; }

        .tester-display {
            width: 100%; text-align: left; word-wrap: break-word; line-height: 1.4;
            color: #111; transition: font-size 0.1s ease; white-space: pre-wrap;
            padding: 20px 0; min-height: 200px;
        }

        @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1>ThitipraStudio</h1>
    <p>เริ่มเปิดขายฟอนต์ลายมือครั้งแรกวันที่ 15 May 2023</p>
    <p> สไตล์ฟอนต์ประจำร้านแนวลายมือน่ารัก สดใสปุ๊กปิ๊ก และทางการเรียบร้อย</p>
</header>

<div class="controls">
    <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาชื่อฟอนต์..." oninput="filterFonts()">
    </div>
    <div class="filter-tabs">
        <button class="tab-btn active" onclick="changeTab('all', this)">ทั้งหมด</button>
        <button class="tab-btn" onclick="changeTab('th', this)">ก-ฮ</button>
        <button class="tab-btn" onclick="changeTab('en', this)">A-Z</button>
    </div>
</div>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-content">
        <h2 id="modalFontName" style="margin: 0; font-size: 1.6rem;">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #bbb; margin: 5px 0 20px 0;">Font Name</p>
        
        <div class="tester-controls">
            <input type="text" class="tester-input" id="testerInput" placeholder="พิมพ์ลองฟอนต์ที่นี่..." oninput="updatePreview()">
            <div class="size-slider-wrapper">
                <span>ขนาด:</span>
                <input type="range" class="size-slider" id="sizeSlider" min="20" max="150" value="80" oninput="updatePreview()">
                <span class="size-label" id="sizeLabel">80px</span>
            </div>
        </div>

        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
        <div class="back-gallery-btn" onclick="closeModal()" style="margin-top:40px; cursor:pointer; color:var(--accent-color); font-weight:bold;">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<script>
    // ข้อมูลฟอนต์
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" }
    ];

    let currentTab = 'all';

    async function loadFonts() {
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`, { display: 'swap' });
                const loaded = await f.load();
                document.fonts.add(loaded);
            } catch (e) { console.error("Error loading:", font.file); }
        }
        filterFonts();
    }

    function changeTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterFonts();
    }

    function filterFonts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('fontList');
        list.innerHTML = "";

        // กรองข้อมูลตาม Tab และ Search
        let filtered = fonts.filter(font => {
            const matchesSearch = font.th.includes(searchTerm) || font.en.toLowerCase().includes(searchTerm);
            
            if (currentTab === 'th') {
                return matchesSearch && /^[ก-ฮ]/.test(font.th);
            } else if (currentTab === 'en') {
                return matchesSearch && /^[a-zA-Z]/.test(font.th) || /^[a-zA-Z]/.test(font.en);
            }
            return matchesSearch;
        });

        // เรียงลำดับ ก-ฮ หรือ A-Z
        filtered.sort((a, b) => a.th.localeCompare(b.th, 'th'));

        const padSize = fonts.length.toString().length;

        filtered.forEach((font, index) => {
            const displayNum = (index + 1).toString().padStart(padSize, '0');
            const div = document.createElement('div');
            div.className = 'font-card';
            div.innerHTML = `
                <div class="font-info">
                    <div class="font-names">
                        <span class="font-num">${displayNum}.</span>
                        <h3>${font.th}</h3>
                        <p style="margin:4px 0 0 45px;color:#999;font-size:0.8rem">${font.en}</p>
                    </div>
                    <div class="price-tag">ส่วนตัว: ${font.p}<br>พาณิชย์: ${font.c}</div>
                </div>
                <div class="preview-text" style="font-family: '${font.en}', sans-serif">สวัสดี hello</div>
            `;
            div.onclick = () => openModal(font, displayNum);
            list.appendChild(div);
        });
    }

    function openModal(font, num) {
        const modal = document.getElementById('fontModal');
        modal.style.display = 'block';
        document.getElementById('modalFontName').innerText = `${num}. ${font.th}`;
        document.getElementById('modalFontEn').innerText = font.en;
        
        const display = document.getElementById('testerDisplay');
        display.style.fontFamily = `'${font.en}', sans-serif`;
        
        // Reset default values
        document.getElementById('sizeSlider').value = 80;
        document.getElementById('testerInput').value = "";
        updatePreview();
        
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('fontModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function updatePreview() {
        const input = document.getElementById('testerInput').value;
        const size = document.getElementById('sizeSlider').value;
        const display = document.getElementById('testerDisplay');
        const label = document.getElementById('sizeLabel');

        display.innerText = input || "hello สวัสดี";
        display.style.fontSize = size + "px";
        label.innerText = size + "px";
    }

    loadFonts();
</script>
</body>
</html>
