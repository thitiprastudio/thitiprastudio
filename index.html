<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview</title>
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #d4af37; 
            --bg-color: #fdfdfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 50px 20px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
            background: #fff;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Font Grid --- */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .font-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .font-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
        }

        .font-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .price-tag {
            text-align: right;
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .preview-text {
            font-size: 2.2rem;
            border-top: 1px solid #f9f9f9;
            padding-top: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Modal (เลื่อนขึ้นลงได้) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto; /* ทำให้ Modal เลื่อนขึ้นลงได้ถ้าเนื้อหายาว */
            flex-direction: column;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 900px;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* ให้เนื้อหาครอบคลุมความสูงหน้าจอ */
        }

        .close-btn {
            position: fixed; /* ให้อยู่กับที่แม้เลื่อนหน้าจอ */
            top: 20px; right: 30px;
            font-size: 40px; cursor: pointer; color: #ccc;
            z-index: 1001;
        }

        .tester-input {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 40px;
            border: none;
            border-bottom: 2px solid #eee;
            text-align: center;
            outline: none;
            background: transparent;
        }

        .tester-display {
            width: 100%;
            text-align: center;
            /* clamp(ขนาดเล็กสุด, ขนาดที่แปรผัน, ขนาดใหญ่สุด) */
            font-size: clamp(1.5rem, 8vw, 5rem); 
            word-wrap: break-word; /* ให้ตัดคำลงบรรทัดใหม่เมื่อยาวเกิน */
            line-height: 1.3;
            color: #111;
            padding-bottom: 50px;
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
            .tester-display { font-size: clamp(1.2rem, 10vw, 3.5rem); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="IPCB5121.PNG" alt="ThitipraStudio Logo">
    </div>
    <h1>ThitipraStudio</h1>
    <p>เริ่มเปิดขายฟอนต์ลายมือครั้งแรกวันที่ 15 May 2023 </p>
    <p>สไตล์ฟอนต์ประจำร้านแนวลายมือน่ารัก สดใสปุ๊กปิ๊กที่สุดในสามโลก แนวลายมือทางการเรียบร้อย</p>
</header>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <h2 id="modalFontName" style="margin: 0;">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #888; margin: 5px 0 40px 0;">Font Name</p>
        
        <input type="text" class="tester-input" id="testerInput" placeholder="พิมพ์ลองฟอนต์ยาวๆ ได้ที่นี่..." oninput="updatePreview(this.value)">
        
        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
    </div>
</div>

<script>
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" }
    ];

    const list = document.getElementById('fontList');
    const modal = document.getElementById('fontModal');
    const display = document.getElementById('testerDisplay');

    async function loadFonts() {
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`);
                await f.load();
                document.fonts.add(f);
                renderCard(font);
            } catch (e) {
                renderCard(font);
            }
        }
    }

    function renderCard(font) {
        const div = document.createElement('div');
        div.className = 'font-card';
        div.innerHTML = `
            <div class="font-info">
                <div class="font-names">
                    <h3>${font.th}</h3>
                    <p>${font.en}</p>
                </div>
                <div class="price-tag">ส่วนตัว: ${font.p}<br>เชิงพาณิชย์: ${font.c}</div>
            </div>
            <div class="preview-text" style="font-family: '${font.en}', sans-serif">hello สวัสดี</div>
        `;
        div.onclick = () => openModal(font);
        list.appendChild(div);
    }

    function openModal(font) {
        modal.style.display = 'flex';
        document.getElementById('modalFontName').innerText = font.th;
        document.getElementById('modalFontEn').innerText = font.en;
        display.style.fontFamily = `'${font.en}', sans-serif`;
        display.innerText = "hello สวัสดี";
        document.getElementById('testerInput').value = "";
        document.body.style.overflow = 'hidden'; // ล็อคหน้าหลักไม่ให้เลื่อน
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // คืนค่าหน้าหลักให้เลื่อนได้
    }

    function updatePreview(val) {
        display.innerText = val || "hello สวัสดี";
    }

    window.onclick = (e) => { if (e.target == modal) closeModal(); }

    loadFonts();
</script>

</body>
</html>
