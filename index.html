<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview & VS Mode</title>
    <style>
        :root {
            --accent-color: #d4af37; 
            --danger-color: #ff4d4d; 
            --bg-color: #fdfdfd;
            --max-w: 1100px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: #333;
        }

        header {
            text-align: center; padding: 50px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Search & VS Controls --- */
        .top-controls {
            max-width: var(--max-w); margin: 20px auto; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .search-input {
            width: 100%; max-width: 500px; padding: 12px 25px; border-radius: 30px;
            border: 1px solid #ddd; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }

        .vs-open-btn {
            background: var(--accent-color); color: white; border: none; padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .vs-open-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- Grid Layout --- */
        .container {
            max-width: var(--max-w); margin: 10px auto 50px; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: 0.3s;
            cursor: pointer; border: 1px solid #eee;
        }
        .font-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .preview-text { font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 15px; text-align: center; }

        /* --- Modal Common --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 95%; max-width: 1000px; margin: 0 auto;
            padding: 80px 10px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px; width: 45px; height: 45px;
            background-color: var(--danger-color); color: white; font-size: 30px;
            border-radius: 50%; cursor: pointer; z-index: 1001; border: none; font-weight: bold;
        }

        /* --- VS Mode Styling --- */
        .vs-layout {
            display: flex; width: 100%; gap: 20px; margin-top: 30px;
        }

        .vs-column {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 20px; border: 1px dashed #ddd; border-radius: 15px; background: #fff;
        }

        .vs-price-info {
            background: #fff9e6; padding: 10px; border-radius: 8px; font-size: 0.8rem;
            margin-bottom: 15px; width: 100%; text-align: center; border: 1px solid #eee;
        }

        .vs-select {
            width: 100%; padding: 10px; border: 1px solid var(--accent-color);
            border-radius: 10px; margin-bottom: 20px; outline: none; cursor: pointer;
        }

        .vs-display {
            width: 100%; text-align: center; word-wrap: break-word; line-height: 1.4;
            min-height: 150px; white-space: pre-wrap; transition: font-size 0.2s;
        }

        .slider-box {
            margin: 20px 0; display: flex; align-items: center; gap: 15px;
        }

        @media (max-width: 768px) {
            .vs-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1>ThitipraStudio</h1>
    <p style="font-size: 0.9rem; color: #888;">ทดลองและเปรียบเทียบฟอนต์ลายมือสุดน่ารัก</p>
</header>

<div class="top-controls">
    <button class="vs-open-btn" onclick="openVSModal()">⚡ เปิดโหมดเปรียบเทียบฟอนต์ (VS Mode)</button>
    <input type="text" id="fontSearch" class="search-input" placeholder="ค้นหาชื่อฟอนต์ที่ต้องการ..." oninput="filterFonts()">
</div>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal('fontModal')">&times;</button>
    <div class="modal-content">
        <h2 id="modalFontName">ชื่อฟอนต์</h2>
        <input type="text" id="testerInput" class="search-input" style="max-width: 600px;" placeholder="พิมพ์ลองฟอนต์ที่นี่..." oninput="refreshDisplay()">
        <div class="slider-box">
            <span>เล็กลง</span>
            <input type="range" id="sizeRange" min="20" max="150" value="80" style="width:200px; accent-color:var(--accent-color);" oninput="refreshDisplay()">
            <span>ใหญ่ขึ้น (<span id="sizeLabel">80px</span>)</span>
        </div>
        <div id="testerDisplay" class="vs-display" style="margin-top:20px;">hello สวัสดี</div>
        <div class="back-gallery-btn" onclick="closeModal('fontModal')">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<div class="modal" id="vsModal">
    <button class="close-btn" onclick="closeModal('vsModal')">&times;</button>
    <div class="modal-content">
        <h2 style="color:var(--accent-color)">Font Comparison (VS)</h2>
        <input type="text" id="vsInput" class="search-input" style="max-width: 600px;" placeholder="พิมพ์ข้อความเดียวเพื่อเปรียบเทียบ..." oninput="refreshVS()">
        
        <div class="slider-box">
            <span>ขนาดตัวอักษร:</span>
            <input type="range" id="vsSizeRange" min="20" max="120" value="50" style="width:200px; accent-color:var(--accent-color);" oninput="refreshVS()">
            <span id="vsSizeLabel" style="font-weight:bold; color:var(--accent-color)">50px</span>
        </div>

        <div class="vs-layout">
            <div class="vs-column">
                <select id="selectLeft" class="vs-select" onchange="refreshVS()"></select>
                <div id="priceLeft" class="vs-price-info"></div>
                <div id="displayLeft" class="vs-display">สวัสดี hello</div>
            </div>

            <div style="display:flex; align-items:center; font-weight:bold; color:#ccc;">VS</div>

            <div class="vs-column">
                <select id="selectRight" class="vs-select" onchange="refreshVS()"></select>
                <div id="priceRight" class="vs-price-info"></div>
                <div id="displayRight" class="vs-display">สวัสดี hello</div>
            </div>
        </div>
        <div class="back-gallery-btn" onclick="closeModal('vsModal')">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<script>
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" }
    ];

    let activeFontSingle = "";

    async function loadFonts() {
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`, { display: 'swap' });
                const loaded = await f.load();
                document.fonts.add(loaded);
            } catch (e) { console.error(e); }
        }
        filterFonts();
        setupVSSelectors();
    }

    function filterFonts() {
        const term = document.getElementById('fontSearch').value.toLowerCase();
        const list = document.getElementById('fontList');
        list.innerHTML = "";
        
        const filtered = fonts.filter(f => f.th.includes(term) || f.en.toLowerCase().includes(term));
        const padSize = fonts.length.toString().length;

        filtered.forEach((font) => {
            const indexOriginal = fonts.findIndex(f => f.en === font.en) + 1;
            const displayNum = indexOriginal.toString().padStart(padSize, '0');
            
            const div = document.createElement('div');
            div.className = 'font-card';
            div.innerHTML = `
                <div class="font-info">
                    <div class="font-names">
                        <span class="font-num">${displayNum}.</span>
                        <h3>${font.th}</h3>
                        <p style="margin:4px 0 0 45px;color:#999;font-size:0.8rem">${font.en}</p>
                    </div>
                    <div class="price-tag">ส่วนตัว: ${font.p}<br>พาณิชย์: ${font.c}</div>
                </div>
                <div class="preview-text" style="font-family:'${font.en}'">สวัสดี hello</div>
            `;
            div.onclick = () => openSingleModal(font, displayNum);
            list.appendChild(div);
        });
    }

    // --- Single Modal Logic ---
    function openSingleModal(font, num) {
        document.getElementById('fontModal').style.display = 'block';
        document.getElementById('modalFontName').innerText = `${num}. ${font.th}`;
        activeFontSingle = font.en;
        document.getElementById('testerInput').value = "";
        document.getElementById('sizeRange').value = 80;
        refreshDisplay();
        document.body.style.overflow = 'hidden';
    }

    function refreshDisplay() {
        const val = document.getElementById('testerInput').value || "hello สวัสดี";
        const size = document.getElementById('sizeRange').value;
        const disp = document.getElementById('testerDisplay');
        disp.innerText = val;
        disp.style.fontFamily = activeFontSingle;
        disp.style.fontSize = size + "px";
        document.getElementById('sizeLabel').innerText = size + "px";
    }

    // --- VS Modal Logic ---
    function setupVSSelectors() {
        const left = document.getElementById('selectLeft');
        const right = document.getElementById('selectRight');
        fonts.forEach((f, i) => {
            const opt = `<option value="${f.en}">${f.th}</option>`;
            left.innerHTML += opt;
            right.innerHTML += opt;
        });
        right.selectedIndex = 1;
    }

    function openVSModal() {
        document.getElementById('vsModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
        refreshVS();
    }

    function refreshVS() {
        const val = document.getElementById('vsInput').value || "สวัสดี hello";
        const size = document.getElementById('vsSizeRange').value;
        const leftF = document.getElementById('selectLeft').value;
        const rightF = document.getElementById('selectRight').value;

        // หาข้อมูลราคา
        const dataL = fonts.find(f => f.en === leftF);
        const dataR = fonts.find(f => f.en === rightF);

        document.getElementById('priceLeft').innerHTML = `<b>ราคา</b><br>ส่วนตัว: ${dataL.p} | พาณิชย์: ${dataL.c}`;
        document.getElementById('priceRight').innerHTML = `<b>ราคา</b><br>ส่วนตัว: ${dataR.p} | พาณิชย์: ${dataR.c}`;

        const dL = document.getElementById('displayLeft');
        const dR = document.getElementById('displayRight');

        dL.innerText = dR.innerText = val;
        dL.style.fontFamily = leftF;
        dR.style.fontFamily = rightF;
        dL.style.fontSize = dR.style.fontSize = size + "px";
        document.getElementById('vsSizeLabel').innerText = size + "px";
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => {
        if (e.target.className === 'modal') {
            closeModal('fontModal');
            closeModal('vsModal');
        }
    }

    loadFonts();
</script>
</body>
</html>
