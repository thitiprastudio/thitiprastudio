<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview & Tester</title>
    <style>
        :root {
            --accent-color: #d4af37; 
            --danger-color: #ff4d4d; 
            --bg-color: #fdfdfd;
            --max-w: 1100px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: #333;
            scroll-behavior: smooth;
        }

        header {
            text-align: center; padding: 40px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Search & Navigation --- */
        .sticky-controls {
            position: sticky; top: 0; background: white; z-index: 100;
            padding: 15px 0; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .search-container { max-width: 500px; margin: 0 auto 15px; padding: 0 20px; }
        .search-input {
            width: 100%; padding: 10px 20px; border-radius: 25px;
            border: 1px solid #ddd; outline: none; font-size: 1rem;
        }

        .alphabet-nav {
            display: flex; flex-wrap: wrap; gap: 2px; justify-content: center;
            max-width: 950px; margin: 0 auto; padding: 0 10px;
        }

        .nav-btn {
            padding: 5px 6px; border: none; background: none; cursor: pointer;
            font-size: 0.85rem; color: #888; transition: 0.2s;
        }
        .nav-btn:hover { color: var(--accent-color); font-weight: bold; }

        /* --- Sections --- */
        .section-title {
            max-width: var(--max-w); margin: 40px auto 10px; padding: 0 20px;
            font-size: 1.5rem; color: var(--accent-color); border-left: 5px solid var(--accent-color);
        }

        .container {
            max-width: var(--max-w); margin: 0 auto 50px; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: 0.3s;
            cursor: pointer; border: 1px solid #eee;
        }
        .font-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .font-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .font-num { color: var(--accent-color); font-weight: bold; font-family: monospace; }
        .price-tag { text-align: right; font-size: 0.75rem; color: var(--accent-color); font-weight: bold; line-height: 1.4; }

        .preview-text {
            font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 15px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
        }

        /* --- Modal & Sizer --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 90%; max-width: 900px; margin: 0 auto;
            padding: 100px 20px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px; width: 45px; height: 45px;
            background-color: var(--danger-color); color: white; font-size: 30px;
            border-radius: 50%; cursor: pointer; z-index: 1001; border: none; font-weight: bold;
        }

        .tester-input {
            width: 100%; max-width: 600px; padding: 15px; font-size: 1.2rem;
            margin-bottom: 20px; border: none; border-bottom: 2px solid #eee;
            text-align: center; outline: none;
        }

        .sizer-container { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; color: #666; }
        .size-slider { cursor: pointer; accent-color: var(--accent-color); width: 200px; }
        #sizeDisplay { font-weight: bold; color: var(--accent-color); }

        .tester-display {
            width: 100%; text-align: left; word-wrap: break-word; line-height: 1.4;
            color: #111; transition: font-size 0.1s ease; white-space: pre-wrap;
        }

        .back-gallery-btn {
            margin-top: 40px; padding: 12px 30px;
            background-color: #eee; color: #555;
            border-radius: 30px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
            border: 1px solid #ddd;
        }
        .back-gallery-btn:hover { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1>ThitipraStudio</h1>
    <p>ค้นหาฟอนต์เรียงตามตัวอักษร และทดลองปรับขนาดได้ตามใจชอบ</p>
</header>

<div class="sticky-controls">
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาชื่อฟอนต์..." oninput="searchFonts()">
    </div>
    <div class="alphabet-nav" id="alphabetNav"></div>
</div>

<div id="mainContent">
    <h2 class="section-title" id="sec-thai">หมวดภาษาไทย (ก-ฮ)</h2>
    <div class="container" id="thaiList"></div>

    <h2 class="section-title" id="sec-eng">หมวดภาษาอังกฤษ (A-Z)</h2>
    <div class="container" id="engList"></div>
</div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-content">
        <h2 id="modalFontName">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #bbb; margin-bottom: 30px;">Font Name</p>
        
        <input type="text" class="tester-input" id="testerInput" placeholder="พิมพ์ลองฟอนต์ที่นี่..." oninput="updatePreview()">
        
        <div class="sizer-container">
            <span>เล็ก</span>
            <input type="range" id="fontSizeSlider" class="size-slider" min="20" max="150" value="80" oninput="updatePreview()">
            <span>ใหญ่ (<span id="sizeDisplay">80px</span>)</span>
        </div>

        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
        <div class="back-gallery-btn" onclick="closeModal()">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<script>
    // ข้อมูลฟอนต์ที่คุณให้มา
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" }
    ];

    const thaiAlpha = "กขฃคฅฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ".split("");
    const engAlpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function init() {
        const nav = document.getElementById('alphabetNav');
        thaiAlpha.forEach(a => createNavBtn(a, nav));
        engAlpha.forEach(a => createNavBtn(a, nav));
        renderFonts();
    }

    function createNavBtn(char, parent) {
        const btn = document.createElement('button');
        btn.innerText = char;
        btn.className = "nav-btn";
        btn.onclick = () => {
            const target = Array.from(document.querySelectorAll('.font-card')).find(card => 
                card.dataset.startChar === char
            );
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };
        parent.appendChild(btn);
    }

    function renderFonts(filter = "") {
        const thaiContainer = document.getElementById('thaiList');
        const engContainer = document.getElementById('engList');
        thaiContainer.innerHTML = "";
        engContainer.innerHTML = "";

        // เรียงลำดับตัวอักษร ก-ฮ
        fonts.sort((a, b) => a.th.localeCompare(b.th, 'th'));

        const padSize = fonts.length.toString().length;

        fonts.forEach((font, index) => {
            if (font.th.toLowerCase().includes(filter.toLowerCase()) || font.en.toLowerCase().includes(filter.toLowerCase())) {
                const numStr = (index + 1).toString().padStart(padSize, '0');
                const card = createCard(font, numStr);
                
                // แยกหมวด ก-ฮ และ A-Z
                if (/^[ก-ฮ]/.test(font.th)) {
                    thaiContainer.appendChild(card);
                } else {
                    engContainer.appendChild(card);
                }
            }
        });
    }

    function createCard(font, num) {
        const div = document.createElement('div');
        div.className = 'font-card';
        const startChar = font.th.charAt(0).toUpperCase();
        div.dataset.startChar = startChar;
        
        div.innerHTML = `
            <div class="font-info">
                <div class="font-names">
                    <span class="font-num">${num}.</span>
                    <h3>${font.th}</h3>
                    <p style="margin:4px 0 0 45px;color:#999;font-size:0.8rem">${font.en}</p>
                </div>
                <div class="price-tag">ส่วนตัว: ${font.p}<br>พาณิชย์: ${font.c}</div>
            </div>
            <div class="preview-text" style="font-family: '${font.en}', sans-serif">สวัสดี hello</div>
        `;
        div.onclick = () => openModal(font, num);
        
        const f = new FontFace(font.en, `url(${font.file})`);
        f.load().then(loaded => document.fonts.add(loaded)).catch(e => console.error(e));
        
        return div;
    }

    function searchFonts() {
        const query = document.getElementById('searchInput').value;
        renderFonts(query);
    }

    function openModal(font, num) {
        document.getElementById('fontModal').style.display = 'block';
        document.getElementById('modalFontName').innerText = `${num}. ${font.th}`;
        document.getElementById('modalFontEn').innerText = font.en;
        const display = document.getElementById('testerDisplay');
        display.style.fontFamily = `'${font.en}', sans-serif`;
        document.getElementById('testerInput').value = "";
        document.getElementById('fontSizeSlider').value = 80;
        updatePreview();
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('fontModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function updatePreview() {
        const input = document.getElementById('testerInput').value || "hello สวัสดี";
        const size = document.getElementById('fontSizeSlider').value;
        const display = document.getElementById('testerDisplay');
        
        display.innerText = input;
        display.style.fontSize = size + "px";
        document.getElementById('sizeDisplay').innerText = size + "px";
    }

    window.onclick = (e) => { if (e.target.id === 'fontModal') closeModal(); }

    init();
</script>
</body>
</html>
