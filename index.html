<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview & Tester</title>
    <style>
        :root {
            --accent-color: #d4af37; 
            --danger-color: #ff4d4d; 
            --bg-color: #fdfdfd;
            --max-w: 1100px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: #333;
        }

        header {
            text-align: center; padding: 50px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Search Bar --- */
        .search-container {
            max-width: var(--max-w);
            margin: 20px auto;
            padding: 0 20px;
            text-align: center;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        /* --- Grid Layout --- */
        .container {
            max-width: var(--max-w);
            margin: 10px auto 50px; padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: 0.3s; cursor: pointer; border: 1px solid #eee;
            display: flex; flex-direction: column;
        }

        .font-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .font-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .font-num { color: var(--accent-color); font-weight: bold; font-family: monospace; margin-right: 8px; font-size: 1rem; }
        .font-names h3 { margin: 0; font-size: 1.1rem; display: inline; }
        .price-tag { text-align: right; font-size: 0.75rem; color: var(--accent-color); font-weight: bold; line-height: 1.4; }

        .preview-text {
            font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 15px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
        }

        /* --- Modal --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 90%; max-width: 900px; margin: 0 auto;
            padding: 100px 20px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px;
            width: 45px; height: 45px;
            background-color: var(--danger-color);
            color: white; font-size: 30px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3);
            z-index: 1001; transition: 0.2s; border: none;
        }

        .tester-controls {
            width: 100%;
            max-width: 600px;
            background: white;
            position: sticky;
            top: 0;
            padding: 20px 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .tester-input {
            width: 100%; padding: 15px; font-size: 1.2rem; border: none;
            border-bottom: 2px solid #eee; text-align: center; outline: none; background: #fff;
        }

        /* ส่วนควบคุมขนาดฟอนต์ */
        .size-control {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            justify-content: center;
            color: #666;
            font-size: 0.9rem;
        }

        .size-slider {
            flex: 1;
            max-width: 300px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .size-number {
            font-weight: bold;
            color: var(--accent-color);
            min-width: 45px;
        }

        .tester-display {
            width: 100%; text-align: left;
            word-wrap: break-word; line-height: 1.4; color: #111;
            transition: font-size 0.1s ease; white-space: pre-wrap;
            padding: 20px 0; min-height: 200px;
        }

        .modal-price-info {
            background: #fff9e6;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #b38f00;
            border: 1px solid #ffe680;
        }

        .back-gallery-btn {
            margin-top: 50px; padding: 12px 30px;
            background-color: #eee; color: #555;
            border-radius: 30px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
            border: 1px solid #ddd;
        }
        .back-gallery-btn:hover { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1>ThitipraStudio</h1>
    <p style="font-size: 0.9rem; color: #888; max-width: 650px; margin: 0 auto;">เริ่มเปิดขายฟอนต์ลายมือครั้งแรกวันที่ 15 May 2023 สไตล์ฟอนต์ประจำร้านแนวลายมือน่ารัก สดใสปุ๊กปิ๊ก และทางการเรียบร้อย</p>
</header>

<div class="search-container">
    <input type="text" id="fontSearch" class="search-input" placeholder="ค้นหาชื่อฟอนต์ที่ต้องการ..." oninput="filterFonts()">
</div>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-content">
        <h2 id="modalFontName" style="margin: 0; font-size: 1.6rem;">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #bbb; margin: 5px 0 10px 0;">Font Name</p>
        
        <div class="modal-price-info" id="modalPrice">ราคา: -</div>

        <div class="tester-controls">
            <input type="text" class="tester-input" id="testerInput" placeholder="พิมพ์ลองฟอนต์ที่นี่..." oninput="refreshDisplay()">
            
            <div class="size-control">
                <span>ย่อ</span>
                <input type="range" id="sizeRange" class="size-slider" min="20" max="150" value="80" oninput="refreshDisplay()">
                <span>ขยาย</span>
                <span class="size-number" id="sizeLabel">80px</span>
            </div>
        </div>

        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
        <div class="back-gallery-btn" onclick="closeModal()">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<script>
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" }
    ];

    let currentFontEn = "";

    async function loadFonts() {
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`, { display: 'swap' });
                const loaded = await f.load();
                document.fonts.add(loaded);
            } catch (e) {
                console.error("Error loading font:", font.file);
            }
        }
        filterFonts(); // รันครั้งแรกเพื่อแสดงฟอนต์ทั้งหมด
    }

    function filterFonts() {
        const searchTerm = document.getElementById('fontSearch').value.toLowerCase();
        const fontList = document.getElementById('fontList');
        fontList.innerHTML = "";
        
        const filtered = fonts.filter(f => 
            f.th.toLowerCase().includes(searchTerm) || 
            f.en.toLowerCase().includes(searchTerm)
        );

        const padSize = fonts.length.toString().length;

        filtered.forEach((font, i) => {
            // หาเลขลำดับดั้งเดิม
            const originalIndex = fonts.findIndex(f => f.en === font.en) + 1;
            const displayNum = originalIndex.toString().padStart(padSize, '0');
            
            const div = document.createElement('div');
            div.className = 'font-card';
            div.innerHTML = `
                <div class="font-info">
                    <div class="font-names">
                        <span class="font-num">${displayNum}.</span>
                        <h3>${font.th}</h3>
                        <p style="margin:4px 0 0 45px;color:#999;font-size:0.8rem">${font.en}</p>
                    </div>
                    <div class="price-tag">ส่วนตัว: ${font.p}<br>พาณิชย์: ${font.c}</div>
                </div>
                <div class="preview-text" style="font-family: '${font.en}', sans-serif">สวัสดี hello</div>
            `;
            div.onclick = () => openModal(font, displayNum);
            fontList.appendChild(div);
        });
    }

    function openModal(font, num) {
        const modal = document.getElementById('fontModal');
        modal.style.display = 'block';
        document.getElementById('modalFontName').innerText = `${num}. ${font.th}`;
        document.getElementById('modalFontEn').innerText = font.en;
        document.getElementById('modalPrice').innerText = `ราคา ส่วนตัว: ${font.p} | เชิงพาณิชย์: ${font.c}`;
        
        currentFontEn = font.en;
        const display = document.getElementById('testerDisplay');
        display.style.fontFamily = `'${font.en}', sans-serif`;
        
        // Reset ค่าใน Modal
        document.getElementById('testerInput').value = "";
        document.getElementById('sizeRange').value = 80;
        refreshDisplay();
        
        document.body.style.overflow = 'hidden';
    }

    function refreshDisplay() {
        const val = document.getElementById('testerInput').value;
        const size = document.getElementById('sizeRange').value;
        const display = document.getElementById('testerDisplay');
        const label = document.getElementById('sizeLabel');
        
        display.innerText = val || "hello สวัสดี";
        display.style.fontSize = size + "px";
        label.innerText = size + "px";
    }

    function closeModal() {
        document.getElementById('fontModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => {
        if (e.target == document.getElementById('fontModal')) closeModal();
    }

    loadFonts();
</script>
</body>
</html>
