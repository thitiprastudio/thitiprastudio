<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThitipraStudio - Font Preview</title>
    <style>
        :root {
            --accent-color: #d4af37; 
            --danger-color: #ff4d4d; 
            --bg-color: #fdfdfd;
            --max-w: 1100px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg-color); color: #333;
        }

        header {
            text-align: center; padding: 50px 20px; background: white; border-bottom: 1px solid #eee;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            border-radius: 12px; overflow: hidden; border: 1px solid #eee;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* จัดหน้าหลักแบบ Grid 2-3 คอลัมน์ */
        .container {
            max-width: var(--max-w);
            margin: 30px auto; padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px;
        }

        .font-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: 0.3s; cursor: pointer; border: 1px solid #eee;
            display: flex; flex-direction: column;
        }

        .font-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .font-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        
        /* สไตล์ตัวเลขลำดับ */
        .font-num { 
            color: var(--accent-color); 
            font-weight: bold; 
            font-family: monospace; /* ใช้ monospace เพื่อให้ตัวเลขกว้างเท่ากันสวยงาม */
            margin-right: 8px; 
            font-size: 1rem; 
        }
        .font-names h3 { margin: 0; font-size: 1.1rem; display: inline; }
        
        .price-tag { text-align: right; font-size: 0.75rem; color: var(--accent-color); font-weight: bold; line-height: 1.4; }

        .preview-text {
            font-size: 1.8rem; border-top: 1px solid #fafafa; padding-top: 15px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            text-align: center;
        }

        /* --- Modal --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto;
        }

        .modal-content {
            width: 90%; max-width: 900px; margin: 0 auto;
            padding: 100px 20px 60px; display: flex; flex-direction: column; align-items: center;
        }

        .close-btn {
            position: fixed; top: 20px; right: 25px;
            width: 45px; height: 45px;
            background-color: var(--danger-color);
            color: white; font-size: 30px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3);
            z-index: 1001; transition: 0.2s; border: none;
        }
        
        .close-btn:hover { transform: scale(1.1); background-color: #ff1a1a; }

        .tester-input {
            width: 100%; max-width: 600px; padding: 15px; font-size: 1.2rem;
            margin-bottom: 40px; border: none; border-bottom: 2px solid #eee;
            text-align: center; outline: none; background: white;
            position: sticky; top: 0; z-index: 10;
        }

        .tester-display {
            width: 100%; text-align: left;
            word-wrap: break-word; line-height: 1.4; color: #111;
            transition: font-size 0.3s ease; white-space: pre-wrap;
            padding: 20px 0; min-height: 200px;
        }

        .back-gallery-btn {
            margin-top: 50px; padding: 12px 30px;
            background-color: #eee; color: #555;
            border-radius: 30px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
            border: 1px solid #ddd;
        }
        .back-gallery-btn:hover { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
            .preview-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="IPCB5121.PNG" alt="Logo"></div>
    <h1>ThitipraStudio</h1>
    <p style="font-size: 0.9rem; color: #888; max-width: 650px; margin: 0 auto;">เริ่มเปิดขายฟอนต์ลายมือครั้งแรกวันที่ 15 May 2023 สไตล์ฟอนต์ประจำร้านแนวลายมือน่ารัก สดใสปุ๊กปิ๊ก และทางการเรียบร้อย</p>
</header>

<div class="container" id="fontList"></div>

<div class="modal" id="fontModal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-content">
        <h2 id="modalFontName" style="margin: 0; font-size: 1.6rem;">ชื่อฟอนต์</h2>
        <p id="modalFontEn" style="color: #bbb; margin: 5px 0 40px 0;">Font Name</p>
        <input type="text" class="tester-input" id="testerInput" placeholder="พิมพ์ลองฟอนต์ที่นี่..." oninput="updatePreview(this.value)">
        <div class="tester-display" id="testerDisplay">hello สวัสดี</div>
        <div class="back-gallery-btn" onclick="closeModal()">← กลับหน้าพรีวิวฟอนต์รวม</div>
    </div>
</div>

<script>
    // คุณสามารถเพิ่มฟอนต์ได้เรื่อยๆ จนถึงหลักพัน
    const fonts = [
        { th: "สเตฟานี่", en: "Stephanie", p: "79.-", c: "169.-", file: "Stephanie.ttf" },
        { th: "แอนโทนี่", en: "Anthony", p: "79.-", c: "169.-", file: "Anthony.ttf" },
        { th: "ลิลลี่", en: "Lily", p: "79.-", c: "169.-", file: "BRLily.ttf" },
        { th: "เฮอร์ไมโอนี่", en: "Hermione", p: "79.-", c: "169.-", file: "Hermione.ttf" },
        { th: "ทริกซี่", en: "Trixie", p: "79.-", c: "169.-", file: "Trixie.ttf" },
        { th: "เรนนี่", en: "Rainy", p: "79.-", c: "169.-", file: "rainy.ttf" },
        { th: "บังทัน", en: "Bangtan", p: "79.-", c: "169.-", file: "Bangtan.ttf" },
        { th: "เซลีน", en: "Selene", p: "89.-", c: "89.-", file: "BRSelene.ttf" },
        { th: "เฟลิกซ์", en: "Felix", p: "79.-", c: "169.-", file: "Felix.ttf" },
        { th: "ซิดนีย์", en: "Sydney", p: "79.-", c: "169.-", file: "Sydney.ttf" }
    ];

    async function loadFonts() {
        // คำนวณความยาวหลักเพื่อเติม 0 (เช่น ถ้ามี 150 ฟอนต์ หลักจะเป็น 3 คือ 001)
        const totalFonts = fonts.length;
        const padSize = totalFonts.toString().length;

        let index = 1;
        for (const font of fonts) {
            try {
                const f = new FontFace(font.en, `url(${font.file})`, { display: 'swap' });
                const loaded = await f.load();
                document.fonts.add(loaded);
                renderCard(font, index, padSize);
            } catch (e) {
                renderCard(font, index, padSize);
            }
            index++;
        }
    }

    function renderCard(font, num, padSize) {
        // ใช้ padStart เพื่อเติม 0 ข้างหน้าตามจำนวนหลักที่มีทั้งหมด
        const displayNum = num.toString().padStart(padSize, '0');
        
        const div = document.createElement('div');
        div.className = 'font-card';
        div.innerHTML = `
            <div class="font-info">
                <div class="font-names">
                    <span class="font-num">${displayNum}.</span>
                    <h3>${font.th}</h3>
                    <p style="margin:4px 0 0 45px;color:#999;font-size:0.8rem">${font.en}</p>
                </div>
                <div class="price-tag">ส่วนตัว: ${font.p}<br>พาณิชย์: ${font.c}</div>
            </div>
            <div class="preview-text" style="font-family: '${font.en}', sans-serif">สวัสดี hello</div>
        `;
        div.onclick = () => openModal(font, displayNum);
        document.getElementById('fontList').appendChild(div);
    }

    function openModal(font, num) {
        const modal = document.getElementById('fontModal');
        modal.style.display = 'block';
        document.getElementById('modalFontName').innerText = `${num}. ${font.th}`;
        document.getElementById('modalFontEn').innerText = font.en;
        const display = document.getElementById('testerDisplay');
        display.style.fontFamily = `'${font.en}', sans-serif`;
        display.style.fontSize = "80px";
        display.innerText = "hello สวัสดี";
        document.getElementById('testerInput').value = "";
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('fontModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function updatePreview(val) {
        const display = document.getElementById('testerDisplay');
        display.innerText = val || "hello สวัสดี";
        let size = 80;
        const len = val.length;
        if (len > 300) size = 30;
        else if (len > 150) size = 40;
        else if (len > 50) size = 60;
        display.style.fontSize = size + "px";
    }

    loadFonts();
</script>
</body>
</html>
